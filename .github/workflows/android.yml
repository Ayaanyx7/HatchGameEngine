name: Build Android Performance Release (Hybrid Java)
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Satisfies the modern Android SDK requirements
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      # Fetches the specific legacy build utilities the project config expects
      - name: Install NDK and Tools
        run: |
          sdkmanager --install "ndk;25.1.8937393" "cmake;3.22.1" "build-tools;30.0.3"

      - name: Make Gradle Executable
        run: chmod +x android/gradlew

      # Compiles both options while forcing compatibility with older source code structure
      - name: Build APKs with Gradle
        run: |
          cd android
          ./gradlew assembleDebug assembleRelease -Pandroid.useOldJava=true -Dorg.gradle.java.home=$JAVA_HOME_17_X64 --no-daemon

      - name: Upload Debug APK (Slow Testing)
        uses: actions/upload-artifact@v4
        with:
          name: HatchEngine-Debug-Slow
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Unsigned Release APK (Max Performance)
        uses: actions/upload-artifact@v4
        with:
          name: HatchEngine-Release-Unsigned
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
