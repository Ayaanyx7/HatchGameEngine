name: Build Android Performance Release (JDK 8)
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '8'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and Tools
        run: |
          sdkmanager --install "ndk;25.1.8937393" "cmake;3.22.1" "build-tools;30.0.3"

      - name: Make Gradle Executable
        run: chmod +x android/gradlew

      # Compiles both Debug and the clean Unsigned Release versions
      - name: Build APKs with Gradle
        run: |
          cd android
          ./gradlew assembleDebug assembleRelease --no-daemon

      # Saves the slow testing version
      - name: Upload Debug APK (Slow Testing)
        uses: actions/upload-artifact@v4
        with:
          name: HatchEngine-Debug-Slow
          path: android/app/build/outputs/apk/debug/app-debug.apk

      # Saves the clean high-performance version for you to sign manually
      - name: Upload Unsigned Release APK (Max Performance)
        uses: actions/upload-artifact@v4
        with:
          name: HatchEngine-Release-Unsigned
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
