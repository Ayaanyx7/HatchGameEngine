name: Build Hatch Engine Android

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '8'

      - name: Build Debug APK
        run: |
          cd Android-Project
          
          # Accept Android licenses automatically using the system's pre-installed SDK
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          
          # Make Gradle executable and compile
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Compiled APK
        uses: actions/upload-artifact@v4
        with:
          name: Hatch-Android-APK
          path: Android-Project/app/build/outputs/apk/debug/*-debug.apk
