name: Build Hatch Engine Android

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '8' # Sticking with Java 8 for old Gradle compatibility

      - name: Inject Google Maven Repository
        run: |
          # Create a global Gradle init script to force-feed the Google and Maven Central repos
          mkdir -p ~/.gradle
          cat << 'EOF' > ~/.gradle/init.gradle
          allprojects {
              buildscript {
                  repositories {
                      google()
                      mavenCentral()
                      maven { url "https://google.com" }
                  }
              }
              repositories {
                  google()
                  mavenCentral()
                  maven { url "https://google.com" }
              }
          }
          EOF

      - name: Build Debug APK
        run: |
          cd Android-Project
          
          # Accept Android licenses automatically
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          
          # Make Gradle executable and compile
          chmod +x gradlew
          ./gradlew assembleDebug --init-script ~/.gradle/init.gradle

      - name: Upload Compiled APK
        uses: actions/upload-artifact@v4
        with:
          name: Hatch-Android-APK
          path: Android-Project/app/build/outputs/apk/debug/*-debug.apk
