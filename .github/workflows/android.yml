name: Build Android Performance Release (Repository Repo Fix)
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        id: setup-java8
        with:
          distribution: 'temurin'
          java-version: '8'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install NDK and Tools
        run: |
          sdkmanager --install "ndk;25.1.8937393" "cmake;3.22.1" "build-tools;30.0.3"

      # Automating a direct patch to your build.gradle to bypass the dead JCenter servers
      - name: Patch Dead Repositories (JCenter Fix)
        run: |
          sed -i 's/jcenter()/google()\n        mavenCentral()/g' Android-Project/build.gradle
          sed -i 's/jcenter()/google()\n        mavenCentral()/g' Android-Project/app/build.gradle

      # Double-checking permissions for your exact repository folder configuration
      - name: Make Gradle Executable
        run: chmod +x Android-Project/gradlew

      - name: Build APKs with Gradle (Forced Java 8 Environment)
        run: |
          cd Android-Project
          export JAVA_HOME="${{ steps.setup-java8.outputs.path }}"
          export PATH="$JAVA_HOME/bin:$PATH"
          ./gradlew assembleDebug assembleRelease --no-daemon

      - name: Upload Debug APK (Slow Testing)
        uses: actions/upload-artifact@v4
        with:
          name: HatchEngine-Debug-Slow
          path: Android-Project/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Unsigned Release APK (Max Performance)
        uses: actions/upload-artifact@v4
        with:
          name: HatchEngine-Release-Unsigned
          path: Android-Project/app/build/outputs/apk/release/app-release-unsigned.apk
