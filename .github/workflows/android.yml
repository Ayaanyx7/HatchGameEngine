name: Build Hatch Engine Android (Unsigned Release)

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive' # Automatically pulls down nested repositories if any exist
          symlinks: true          # CRITICAL: Forces GitHub to clone and preserve original symbolic links

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '8'

      - name: Inject Google Maven Repository
        run: |
          mkdir -p ~/.gradle
          cat << 'EOF' > ~/.gradle/init.gradle
          allprojects {
              buildscript {
                  repositories {
                      google()
                      mavenCentral()
                      maven { url "https://google.com" }
                  }
              }
              repositories {
                  google()
                  mavenCentral()
                  maven { url "https://google.com" }
              }
          }
          EOF

      - name: Overwrite with Clean Gradle Configuration
        run: |
          cat << 'EOF' > Android-Project/app/build.gradle
          apply plugin: 'com.android.application'

          android {
              compileSdkVersion 26
              buildToolsVersion "26.0.2"

              defaultConfig {
                  applicationId "com.aknet.hatch"
                  minSdkVersion 19
                  targetSdkVersion 26
                  versionCode 1
                  versionName "1.0"
              }

              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
                  }
              }
          }

          dependencies {
              implementation fileTree(dir: 'libs', include: ['*.jar'])
          }
          EOF
          echo "Successfully replaced build.gradle with a clean template."

      - name: Build Unsigned Release APK
        run: |
          cd Android-Project
          
          # Accept Android SDK licenses automatically
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          
          # Run the standard optimized compilation pipeline
          chmod +x gradlew
          ./gradlew assembleRelease --init-script ~/.gradle/init.gradle

      - name: Upload Unsigned APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hatch-Android-Unsigned-Release
          path: ./**/build/outputs/apk/**/*.apk
