name: Build Hatch Engine Android (Unsigned Release)

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '8'

      - name: Inject Google Maven Repository
        run: |
          mkdir -p ~/.gradle
          cat << 'EOF' > ~/.gradle/init.gradle
          allprojects {
              buildscript {
                  repositories {
                      google()
                      mavenCentral()
                      maven { url "https://google.com" }
                  }
              }
              repositories {
                  google()
                  mavenCentral()
                  maven { url "https://google.com" }
              }
          }
          EOF

      - name: Mock Broken Windows Keystore Path
        run: |
          # Create a dummy keystore file inside the runner environment
          touch mock_cert.jks
          
          # Force Linux to redirect the hardcoded Windows string to our dummy file
          sudo mkdir -p "/C:/AndroidPROJ"
          sudo ln -s "$(pwd)/mock_cert.jks" "/C:/AndroidPROJ/cert.jks"

      - name: Build Unsigned Release APK
        run: |
          cd Android-Project
          
          # Accept Android SDK licenses automatically
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          
          # Execute a standard release build sequence
          chmod +x gradlew
          ./gradlew assembleRelease --init-script ~/.gradle/init.gradle

      - name: Upload Unsigned APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hatch-Android-Unsigned-Release
          path: ./**/build/outputs/apk/**/*.apk
