name: Build Hatch Engine Android

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Debug APK
        run: |
          # Change directory explicitly into the Android-Project folder
          cd Android-Project
          
          # Make the gradlew wrapper script executable
          chmod +x gradlew
          
          # Compile the ready-to-install debug app binary
          ./gradlew assembleDebug

      - name: Upload Compiled APK
        uses: actions/upload-artifact@v4
        with:
          name: Hatch-Android-APK
          path: Android-Project/app/build/outputs/apk/debug/*-debug.apk
