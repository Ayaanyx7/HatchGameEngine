name: Build Android Performance Release (Fixed Grammar)
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Locks down Java 8 for compiling, Java 17 for running the modern SDK manager
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        id: setup-java8
        with:
          distribution: 'temurin'
          java-version: '8'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install NDK and Tools
        run: |
          sdkmanager --install "ndk;25.1.8937393" "cmake;3.22.1" "build-tools;30.0.3"

      # Pure target lines: This removes the exact Windows lines but leaves all brackets intact
      - name: Patch Dead Repos and Safely Comment Out Windows Cert Lines
        run: |
          sed -i 's/jcenter()/google()\n        mavenCentral()/g' Android-Project/build.gradle
          sed -i 's/jcenter()/google()\n        mavenCentral()/g' Android-Project/app/build.gradle
          sed -i 's/storeFile file("C:\/AndroidPROJ\/cert.jks")/\/\/ storeFile file("C:\/AndroidPROJ\/cert.jks")/g' Android-Project/app/build.gradle
          sed -i 's/storePassword "hatchgameengine"/\/\/ storePassword "hatchgameengine"/g' Android-Project/app/build.gradle
          sed -i 's/keyAlias "hatch"/\/\/ keyAlias "hatch"/g' Android-Project/app/build.gradle
          sed -i 's/keyPassword "hatchgameengine"/\/\/ keyPassword "hatchgameengine"/g' Android-Project/app/build.gradle
          sed -i 's/signingConfig signingConfigs.release/\/\/ signingConfig signingConfigs.release/g' Android-Project/app/build.gradle

      - name: Make Gradle Executable
        run: chmod +x Android-Project/gradlew

      # Binds our legacy NDK directly to the engine workspace
      - name: Configure Local NDK Properties
        run: |
          echo "ndk.dir=$ANDROID_HOME/ndk/25.1.8937393" > Android-Project/local.properties

      # Compiles your smooth, high-performance APK deliverables
      - name: Build APKs with Gradle (Forced Java 8 Environment)
        run: |
          cd Android-Project
          export JAVA_HOME="${{ steps.setup-java8.outputs.path }}"
          export PATH="$JAVA_HOME/bin:$PATH"
          ./gradlew assembleDebug assembleRelease --no-daemon

      - name: Upload Debug APK (Slow Testing)
        uses: actions/upload-artifact@v4
        with:
          name: HatchEngine-Debug-Slow
          path: Android-Project/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Unsigned Release APK (Max Performance)
        uses: actions/upload-artifact@v4
        with:
          name: HatchEngine-Release-Unsigned
          path: Android-Project/app/build/outputs/apk/release/app-release-unsigned.apk
