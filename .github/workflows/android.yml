name: I Want To Play Sonic Galactic So Bad
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Set up JDK 17 globally to handle modern Android tools and Gradle 7.5
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Automatically downloads an isolated JDK 8 instance for the source compiler
      - name: Set up JDK 8 (Target Engine Compiler)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '8'

      # Initialize Android SDK Setup Environment
      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Accept Android SDK Licenses
        run: yes | sdkmanager --licenses

      - name: Install NDK and Tools
        run: |
          sdkmanager --install "ndk;25.1.8937393" "cmake;3.22.1" "build-tools;30.0.3"

      # Structural Patching: Wipes out the dead JCenter repositories and deletes the entire signing block cleanly
      - name: Patch Dead Repos and Delete Broken Windows Signing Configurations
        run: |
          sed -i 's/jcenter()/google()\n        mavenCentral()/g' Android-Project/build.gradle
          sed -i 's/jcenter()/google()\n        mavenCentral()/g' Android-Project/app/build.gradle
          
          # This deletes everything between the signingConfigs opening and closing statements completely
          sed -i '/signingConfigs {/,/^    }/d' Android-Project/app/build.gradle
          
          # This wipes out the line that links the release build to those deleted configurations
          sed -i '/signingConfig signingConfigs.release/d' Android-Project/app/build.gradle

      # Forces the old project wrapper to upgrade to 7.5 so Java 17 doesn't crash it
      - name: Upgrade Legacy Gradle Wrapper
        run: |
          cd Android-Project
          sed -i 's/distributionUrl=.*/distributionUrl=https\\:\/\/services.gradle.org\/distributions\/gradle-7.5-bin.zip/g' gradle/wrapper/gradle-wrapper.properties

      # Ensures the Linux runner has permission to execute the upgraded build tool
      - name: Make Gradle Executable
        run: chmod +x Android-Project/gradlew

      # Maps our specific legacy NDK to the engine workspace
      - name: Configure Local NDK Properties
        run: |
          echo "ndk.dir=$ANDROID_HOME/ndk/25.1.8937393" > Android-Project/local.properties

      # Compiles your clean, high-performance APK deliverables
      - name: Build APKs with Gradle
        run: |
          cd Android-Project
          ./gradlew assembleDebug assembleRelease --no-daemon

      - name: Upload Debug APK (Slow Testing)
        uses: actions/upload-artifact@v4
        with:
          name: HatchEngine-Debug-Slow
          path: Android-Project/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Unsigned Release APK (Max Performance)
        uses: actions/upload-artifact@v4
        with:
          name: HatchEngine-Release-Unsigned
          path: Android-Project/app/build/outputs/apk/release/app-release-unsigned.apk
