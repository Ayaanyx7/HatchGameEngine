name: Build Hatch Engine Android (Unsigned Release)

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '8'

      - name: Inject Google Maven Repository
        run: |
          mkdir -p ~/.gradle
          cat << 'EOF' > ~/.gradle/init.gradle
          allprojects {
              buildscript {
                  repositories {
                      google()
                      mavenCentral()
                      maven { url "https://maven.google.com" }
                  }
              }
              repositories {
                  google()
                  mavenCentral()
                  maven { url "https://maven.google.com" }
              }
          }
          EOF

      - name: Completely Remove Signing Block from Gradle File
        run: |
          python3 -c '
          import re

          file_path = "Android-Project/app/build.gradle"
          with open(file_path, "r") as f:
              content = f.read()

          # Remove the signingConfigs block completely without breaking formatting brackets
          content = re.sub(r"signingConfigs\s*\{.*?\n\s*\}", "", content, flags=re.DOTALL)

          # Delete the line inside release block that points to the deleted config
          content = re.sub(r".*signingConfig\s+signingConfigs\..*", "", content)

          with open(file_path, "w") as f:
              f.write(content)
          '
          echo "Successfully scrubbed hardcoded Windows paths from build configurations."

      - name: Build Unsigned Release APK
        run: |
          cd Android-Project
          
          # Accept Android SDK licenses automatically
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          
          # Run the standard optimized compilation pipeline
          chmod +x gradlew
          ./gradlew assembleRelease --init-script ~/.gradle/init.gradle

      - name: Upload Unsigned APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hatch-Android-Unsigned-Release
          path: ./**/build/outputs/apk/**/*.apk
