name: Build Android Performance Release (True Legacy)
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Forces the entire cloud machine to stay locked to Java 8
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '8'

      # Downloads the precise manual tools matching older Gradle versions
      - name: Setup Legacy Android SDK Tools
        uses: android-actions/setup-android@v2

      - name: Install NDK and SDK Components
        run: |
          sdkmanager --install "ndk;25.1.8937393" "cmake;3.22.1" "build-tools;30.0.3" "platforms;android-30"

      - name: Make Gradle Executable
        run: chmod +x Android-Project/gradlew

      # Compiles your Unsigned Release and Debug builds cleanly under Java 8 parameters
      - name: Build APKs with Gradle
        run: |
          cd Android-Project
          ./gradlew assembleDebug assembleRelease --no-daemon

      - name: Upload Debug APK (Slow Testing)
        uses: actions/upload-artifact@v4
        with:
          name: HatchEngine-Debug-Slow
          path: Android-Project/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Unsigned Release APK (Max Performance)
        uses: actions/upload-artifact@v4
        with:
          name: HatchEngine-Release-Unsigned
          path: Android-Project/app/build/outputs/apk/release/app-release-unsigned.apk
