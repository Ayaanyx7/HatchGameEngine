name: Build Android Performance Release (Dual-Java Fix)
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Install Java 8 first so we can grab its exact system location
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        id: setup-java8
        with:
          distribution: 'temurin'
          java-version: '8'

      # Install Java 17 second so it becomes the default system environment for the SDK tools
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      # Uses Java 17 to successfully pull down the C++ compiler tools without crashing
      - name: Install NDK and Tools
        run: |
          sdkmanager --install "ndk;25.1.8937393" "cmake;3.22.1" "build-tools;30.0.3"

      - name: Make Gradle Executable
        run: chmod +x Android-Project/gradlew

      # Swaps the environment home variables back to Java 8 specifically for the project folder
      - name: Build APKs with Gradle (Forced Java 8 Environment)
        run: |
          cd Android-Project
          export JAVA_HOME="${{ steps.setup-java8.outputs.path }}"
          export PATH="$JAVA_HOME/bin:$PATH"
          ./gradlew assembleDebug assembleRelease --no-daemon

      - name: Upload Debug APK (Slow Testing)
        uses: actions/upload-artifact@v4
        with:
          name: HatchEngine-Debug-Slow
          path: Android-Project/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Unsigned Release APK (Max Performance)
        uses: actions/upload-artifact@v4
        with:
          name: HatchEngine-Release-Unsigned
          path: Android-Project/app/build/outputs/apk/release/app-release-unsigned.apk
