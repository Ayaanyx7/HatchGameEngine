name: Build Hatch Engine Android

on:
  workflow_dispatch: # Allows you to manually trigger the build from the GitHub Actions tab

jobs:
  build-android:
    runs-on: ubuntu-latest # Uses a fast, pre-configured Linux runner

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu' # Highly stable OpenJDK distribution
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle Wrapper Executable
        run: |
          # Finds the gradle folder dynamically and grants execution rights
          if [ -f "android/gradlew" ]; then
            chmod +x android/gradlew
          elif [ -f "gradlew" ]; then
            chmod +x gradlew
          fi

      - name: Build Unsigned Release APK
        run: |
          if [ -d "android" ]; then
            cd android
          fi
          ./gradlew assembleRelease

      - name: Upload Compiled APK
        uses: actions/upload-artifact@v4
        with:
          name: Hatch-Android-APK
          path: ./**/build/outputs/apk/release/*-release-unsigned.apk
